services:
  model2vec:
    image: docker.io/tys203831/model2vec-rs-api-server:main
    container_name: model2vec-rs
    environment:
      - MODEL_NAME=${MODEL_NAME:-minishlab/potion-base-8M}
      - ALIAS_MODEL_NAME=${ALIAS_MODEL_NAME:-}
      - PORT=${PORT:-8080}
      - AUTHENTICATION_ALLOWED_TOKENS=${AUTHENTICATION_ALLOWED_TOKENS:-}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    restart: unless-stopped
    # Distroless image has no shell or curl/wget, so avoid in-container healthcheck
