services:
  model2vec:
    build:
      context: .
      dockerfile: Dockerfile
    image: model2vec-rs:latest
    container_name: model2vec-rs
    environment:
      - MODEL_NAME=${MODEL_NAME:-minishlab/potion-base-8M}
      - ALIAS_MODEL_NAME=${ALIAS_MODEL_NAME:-}
      - PORT=${PORT:-8080}
      - AUTHENTICATION_ALLOWED_TOKENS=${AUTHENTICATION_ALLOWED_TOKENS:-}
      - HF_HOME=/data/hf
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - hf-cache:/data/hf
    restart: unless-stopped

volumes:
  hf-cache:
